name: CI

on:
  push:
    branches: main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: C core (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Fetch tree-sitter grammars
        run: make submodules

      - name: Build
        run: make build

      - name: Test
        run: make test
