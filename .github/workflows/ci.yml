name: CI

on:
  push:
    branches: main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: C core (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libcurl4-openssl-dev libpq-dev

      - name: Fetch tree-sitter grammars
        run: make submodules

      - name: Build
        run: make build-core

      - name: Test
        run: make test

  index-providers:
    name: Index provider integration (usearch + qdrant + pgvector)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: codeberg
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libcurl4-openssl-dev libpq-dev postgresql-client

      - name: Fetch tree-sitter grammars
        run: make submodules

      - name: Build
        run: make build-core

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:6333/readyz && exit 0
            sleep 1
          done
          exit 1

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 60); do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres -d codeberg && exit 0
            sleep 1
          done
          exit 1

      - name: Test index providers
        env:
          CBERG_TEST_QDRANT_URL: http://127.0.0.1:6333
          CBERG_TEST_POSTGRES_URL: postgresql://postgres:test@127.0.0.1:5432/codeberg
        run: ./core/build/test/test_index_providers
